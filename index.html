<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>My Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css">
    <style>
        /* サイドバー折りたたみ：親フォルダの開閉インジケーター */
        .sidebar-nav li.folder-item {
            cursor: pointer;
            user-select: none;
        }
        .sidebar-nav li.folder-item > .folder-label {
            display: block;
            font-size: 1.05em;
            font-weight: 600;
            color: var(--sidebar-nav-link-color, #364149);
            line-height: var(--sidebar-nav-link-line-height, inherit);
            padding: var(--sidebar-nav-link-padding, 4px 0);
            margin: 0;
        }
        .sidebar-nav li.folder-item > .folder-label::before {
            content: '▶ ';
            font-size: 0.75em;
        }
        .sidebar-nav li.folder-item.open > .folder-label::before {
            content: '▼ ';
        }
        .sidebar-nav li.folder-item > ul {
            display: none;
            margin-top: 0;
            padding-top: 0;
            padding-left: 1.2em;
        }
        .sidebar-nav li.folder-item.open > ul {
            display: block;
        }
        /* ネストフォルダのラベルは親より小さく */
        .sidebar-nav li.folder-item li.folder-item > .folder-label {
            font-size: 0.97em;
            font-weight: 500;
        }
        /* コンテンツエリア：最大幅撤廃・左寄せ */
        :root {
            --content-max-width: none;
        }
        .markdown-section {
            max-width: none !important;
        }
        /* SVGスクロールラッパー */
        .svg-scroll-wrapper {
            overflow: auto;
        }
    </style>
</head>

<body>
    <div id="app">読み込み中...</div>
    <script>
        // クォートに対応したシンプルな CSV パーサー
        function parseCSV(text) {
            var rows = [], row = [], field = '', inQuotes = false;
            for (var i = 0; i < text.length; i++) {
                var ch = text[i];
                if (ch === '"') {
                    if (inQuotes && text[i + 1] === '"') { field += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) {
                    row.push(field); field = '';
                } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
                    if (ch === '\r' && text[i + 1] === '\n') i++;
                    row.push(field); field = '';
                    if (row.some(function (f) { return f !== ''; })) rows.push(row);
                    row = [];
                } else {
                    field += ch;
                }
            }
            if (field !== '' || row.length) { row.push(field); rows.push(row); }
            return rows;
        }

        window.$docsify = {
            name: 'ドキュメント管理',
            repo: 'wawonpapa/doc_management_test',
            loadSidebar: true,  // サイドバーを有効化
            subMaxLevel: 0,     // 目次の深さ（0=見出し非表示）
            auto2top: true,     // ページ切り替え時に最上部へ
            search: {
                maxAge: 86400000, // キャッシュの有効期限（1日）
                paths: 'auto',    // または後述のファイルリスト
                placeholder: 'キーワードを入力...',
                noData: '見つかりません',
                depth: 6,         // 検索対象にする見出しの深さ
                hideOtherSidebarContent: false, // 検索時に他のサイドバー内容を隠すか
            },
            plugins: [
                // grid.js で CSV コードブロックをテーブルに変換するプラグイン
                function (hook, vm) {
                    hook.doneEach(function () {
                        document.querySelectorAll('pre code.lang-gridjs, pre code.language-gridjs').forEach(function (block) {
                            var csvText = block.textContent.trim();
                            var rows = parseCSV(csvText);
                            if (rows.length < 2) return;

                            var headers = rows[0];
                            var data = rows.slice(1);

                            var container = document.createElement('div');
                            block.closest('pre').replaceWith(container);

                            new gridjs.Grid({
                                columns: headers,
                                data: data,
                                search: true,
                                sort: true,
                                pagination: { limit: 20 },
                                language: {
                                    search: { placeholder: 'キーワードで絞り込む...' },
                                    pagination: {
                                        previous: '前へ',
                                        next: '次へ',
                                        showing: '',
                                        results: () => '件',
                                    },
                                    noRecordsFound: 'データが見つかりません',
                                    loading: '読み込み中...',
                                }
                            }).render(container);
                        });
                    });
                },
                // サイドバー折りたたみプラグイン
                function (hook, vm) {
                    // ページ遷移をまたいで開閉状態を保持する
                    var openFolderNames = new Set();

                    hook.doneEach(function () {
                        document.querySelectorAll('.sidebar-nav li').forEach(function (li) {
                            var subList = li.querySelector(':scope > ul');
                            if (!subList) return;
                            if (li.querySelector(':scope > a')) return; // リンク付きアイテムはスキップ

                            // テキストを .folder-label に包む（<p>タグや空白ノードをすべて除去）
                            var label = document.createElement('span');
                            label.className = 'folder-label';
                            Array.from(li.childNodes).forEach(function (node) {
                                if (node === subList) return;
                                var text = node.textContent.trim();
                                if (text) label.textContent = text;
                                li.removeChild(node);
                            });
                            li.insertBefore(label, subList);

                            li.classList.add('folder-item');

                            // 再描画後も開いていたフォルダを復元
                            if (openFolderNames.has(label.textContent)) {
                                li.classList.add('open');
                            }

                            label.addEventListener('click', function (e) {
                                li.classList.toggle('open');
                                if (li.classList.contains('open')) {
                                    openFolderNames.add(label.textContent);
                                } else {
                                    openFolderNames.delete(label.textContent);
                                }
                                e.stopPropagation();
                            });
                        });
                    });
                },
                // SVG 内リンクを Docsify 形式に変換するプラグイン
                function (hook, vm) {
                    hook.doneEach(function () {
                        // 全ての .svg 画像を対象にする
                        const images = document.querySelectorAll('img[src$=".svg"]');

                        images.forEach(img => {
                            const imgUrl = img.src;

                            // SVGファイルをテキストとして読み込む
                            fetch(imgUrl)
                                .then(res => res.text())
                                .then(data => {
                                    // 1. テキストデータをDOM要素に変換
                                    const parser = new DOMParser();
                                    const svgDoc = parser.parseFromString(data, 'image/svg+xml');
                                    const svgElement = svgDoc.querySelector('svg');

                                    if (svgElement) {
                                        // 2. SVG内の全てのリンクを調整する
                                        const links = svgElement.querySelectorAll('a');
                                        links.forEach(link => {
                                            let href = link.getAttribute('xlink:href') || link.getAttribute('href');

                                            // もし相対パスの .md リンクなら、Docsifyのハッシュ形式 (#/) に変換
                                            if (href && href.endsWith('.md') && !href.startsWith('#')) {
                                                // ここが重要！ Docsifyが認識できる形式に書き換える
                                                link.setAttribute('xlink:href', '#/' + href);
                                                link.setAttribute('href', '#/' + href);
                                                // 親ウィンドウ（Docsify全体）を遷移させる
                                                link.setAttribute('target', '_top');
                                            }
                                        });

                                        // 3. 元の <img> をスクロール可能なコンテナ + <svg> に置き換える
                                        // SVGは自然サイズで表示（拡大なし）、右ペイン全体を表示領域とする
                                        svgElement.style.display = 'block';

                                        const wrapper = document.createElement('div');
                                        wrapper.className = 'svg-scroll-wrapper';
                                        wrapper.appendChild(svgElement);
                                        img.parentNode.replaceChild(wrapper, img);

                                        // 右ペイン右端までラッパーを広げる（左余白はそのまま保持）
                                        requestAnimationFrame(function () {
                                            const pane = wrapper.closest('.content') || wrapper.closest('section');
                                            if (!pane) return;
                                            const paneRect = pane.getBoundingClientRect();
                                            const wrapperRect = wrapper.getBoundingClientRect();
                                            const rightExtension = paneRect.right - wrapperRect.right;
                                            if (rightExtension > 0) {
                                                wrapper.style.width = (wrapper.clientWidth + rightExtension) + 'px';
                                            }
                                        });
                                    }
                                });
                        });
                    });
                }
            ]
        };

    </script>
    <script src="//cdn.jsdelivr.net/npm/gridjs/dist/gridjs.umd.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>

</html>
